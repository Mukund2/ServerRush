name: ServerRush
options:
  bundleIdPrefix: com.mukund
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  ServerRush:
    type: application
    platform: iOS
    sources:
      - path: ServerRush
        excludes:
          - Info.plist
    info:
      path: ServerRush/Info.plist
      properties:
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UILaunchScreen: {}
        CFBundleDisplayName: Server Rush
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mukund.ServerRush
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: 8JGWLCTJ7D
        CODE_SIGN_STYLE: Automatic
